<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <rect width="800" height="480" fill="#1a1a1a"/>

  <!-- Toolbar -->
  <rect width="800" height="52" fill="#2c6fad"/>
  <text x="20" y="33" fill="white" font-family="Segoe UI,Arial,sans-serif" font-size="16" font-weight="600">Cadastro de Fornecedor</text>

  <!-- Page body -->
  <rect x="0" y="52" width="800" height="428" fill="#1e1e1e"/>

  <!-- === STEPPER === -->
  <!-- Step connector line -->
  <line x1="120" y1="100" x2="680" y2="100" stroke="#353535" stroke-width="2"/>
  <line x1="120" y1="100" x2="400" y2="100" stroke="#2c6fad" stroke-width="2"/>

  <!-- Step 1 — done -->
  <circle cx="120" cy="100" r="18" fill="#2c6fad"/>
  <text x="120" y="106" fill="white" font-family="Segoe UI,Arial,sans-serif" font-size="14" text-anchor="middle" font-weight="700">✓</text>
  <text x="120" y="128" fill="#7ab3d4" font-family="Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">Identificação</text>

  <!-- Step 2 — active -->
  <circle cx="400" cy="100" r="18" fill="#2c6fad" stroke="white" stroke-width="2"/>
  <text x="400" y="106" fill="white" font-family="Segoe UI,Arial,sans-serif" font-size="14" text-anchor="middle" font-weight="700">2</text>
  <text x="400" y="128" fill="white" font-family="Segoe UI,Arial,sans-serif" font-size="12" text-anchor="middle" font-weight="600">Endereço</text>

  <!-- Step 3 — pending -->
  <circle cx="680" cy="100" r="18" fill="#252525" stroke="#353535" stroke-width="2"/>
  <text x="680" y="106" fill="#666" font-family="Segoe UI,Arial,sans-serif" font-size="14" text-anchor="middle" font-weight="700">3</text>
  <text x="680" y="128" fill="#666" font-family="Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">Contatos</text>

  <!-- === STEP 2 FORM: Endereço === -->
  <text x="24" y="162" fill="#7ab3d4" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="600">Endereço</text>
  <line x1="24" y1="167" x2="776" y2="167" stroke="#2c6fad" stroke-width="1" opacity="0.4"/>

  <!-- CEP + Buscar -->
  <text x="24" y="190" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="11">CEP *</text>
  <rect x="24" y="196" width="160" height="32" rx="4" fill="#1a1a1a" stroke="#353535" stroke-width="1"/>
  <text x="36" y="217" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13">01310-100</text>
  <rect x="192" y="196" width="80" height="32" rx="4" fill="#252525" stroke="#2c6fad" stroke-width="1"/>
  <text x="232" y="217" fill="#7ab3d4" font-family="Segoe UI,Arial,sans-serif" font-size="13" text-anchor="middle">Buscar</text>

  <!-- Logradouro -->
  <text x="24" y="248" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="11">Logradouro *</text>
  <rect x="24" y="254" width="500" height="32" rx="4" fill="#1a1a1a" stroke="#353535" stroke-width="1"/>
  <text x="36" y="275" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13">Av. Paulista</text>

  <!-- Número + Complemento -->
  <text x="24" y="306" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="11">Número *</text>
  <rect x="24" y="312" width="120" height="32" rx="4" fill="#1a1a1a" stroke="#2c6fad" stroke-width="1.5"/>
  <text x="36" y="333" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13">1000</text>

  <text x="160" y="306" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="11">Complemento</text>
  <rect x="160" y="312" width="364" height="32" rx="4" fill="#1a1a1a" stroke="#353535" stroke-width="1"/>
  <text x="172" y="333" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13">Sala 42</text>

  <!-- Cidade + Estado -->
  <text x="24" y="364" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="11">Cidade *</text>
  <rect x="24" y="370" width="300" height="32" rx="4" fill="#1a1a1a" stroke="#353535" stroke-width="1"/>
  <text x="36" y="391" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13">São Paulo</text>

  <text x="340" y="364" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="11">Estado *</text>
  <rect x="340" y="370" width="184" height="32" rx="4" fill="#1a1a1a" stroke="#353535" stroke-width="1"/>
  <text x="352" y="391" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13">SP</text>
  <text x="506" y="391" fill="#555" font-family="Segoe UI,Arial,sans-serif" font-size="14">▾</text>

  <!-- Navigation buttons -->
  <rect x="0" y="430" width="800" height="50" fill="#1a1a1a"/>
  <line x1="0" y1="430" x2="800" y2="430" stroke="#353535" stroke-width="1"/>
  <rect x="24" y="440" width="80" height="28" rx="4" fill="transparent" stroke="#353535" stroke-width="1"/>
  <text x="64" y="459" fill="#aaa" font-family="Segoe UI,Arial,sans-serif" font-size="13" text-anchor="middle">‹ Voltar</text>
  <rect x="692" y="440" width="84" height="28" rx="4" fill="#2c6fad"/>
  <text x="734" y="459" fill="white" font-family="Segoe UI,Arial,sans-serif" font-size="13" text-anchor="middle">Próximo ›</text>
</svg>
