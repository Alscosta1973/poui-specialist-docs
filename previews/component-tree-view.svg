<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <!-- Background -->
  <rect width="800" height="480" fill="#1a1a1a"/>
  <!-- Toolbar -->
  <rect width="800" height="52" fill="#2c6fad"/>
  <text x="20" y="33" fill="white" font-family="Segoe UI,Arial,sans-serif" font-size="16" font-weight="600">Categorias de Produtos</text>
  <!-- Body -->
  <rect x="0" y="52" width="800" height="428" fill="#1e1e1e"/>

  <!-- Left panel: tree view -->
  <rect x="16" y="70" width="320" height="392" rx="6" fill="#242424" stroke="#353535" stroke-width="1"/>
  <text x="36" y="96" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="600">Árvore de Categorias</text>
  <line x1="36" y1="104" x2="320" y2="104" stroke="#353535" stroke-width="1"/>

  <!-- Tree nodes -->
  <!-- Level 0: Eletrônicos (expanded) -->
  <text x="44" y="126" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="13">▼</text>
  <text x="62" y="126" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13">Eletrônicos</text>

    <!-- Level 1 children of Eletrônicos -->
    <line x1="52" y1="136" x2="52" y2="200" stroke="#353535" stroke-width="1"/>
    <text x="64" y="152" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="12">▼</text>
    <text x="80" y="152" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="12">Computadores</text>

      <!-- Level 2 children of Computadores -->
      <line x1="72" y1="162" x2="72" y2="202" stroke="#2a2a2a" stroke-width="1"/>
      <!-- Active item highlighted -->
      <rect x="80" y="160" width="224" height="24" rx="3" fill="#1e2a3a"/>
      <text x="90" y="176" fill="#5b9bd5" font-family="Segoe UI,Arial,sans-serif" font-size="11">📁 Notebooks</text>
      <text x="88" y="200" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="11">Desktops</text>

    <text x="64" y="224" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="12">▶</text>
    <text x="80" y="224" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="12">Celulares</text>

  <!-- Level 0: Vestuário (collapsed) -->
  <text x="44" y="252" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="13">▶</text>
  <text x="62" y="252" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13">Vestuário</text>

  <!-- Level 0: Alimentos (collapsed) -->
  <text x="44" y="278" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="13">▶</text>
  <text x="62" y="278" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13">Alimentos</text>

  <!-- Level 0: Ferramentas (leaf) -->
  <text x="62" y="304" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="13">Ferramentas</text>

  <!-- Right panel: detail -->
  <rect x="352" y="70" width="432" height="392" rx="6" fill="#242424" stroke="#353535" stroke-width="1"/>
  <text x="372" y="96" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="600">Detalhes da Categoria Selecionada</text>
  <line x1="372" y1="104" x2="768" y2="104" stroke="#353535" stroke-width="1"/>

  <!-- Selected item info -->
  <text x="372" y="130" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="11">Nome</text>
  <text x="372" y="148" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13">Notebooks</text>

  <text x="372" y="172" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="11">Caminho</text>
  <text x="372" y="190" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13">Eletrônicos &gt; Computadores &gt; Notebooks</text>

  <text x="372" y="214" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="11">Código</text>
  <text x="372" y="232" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13">CAT-0043</text>

  <text x="372" y="256" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="11">Produtos nesta categoria</text>
  <text x="372" y="274" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13">47 produtos</text>

  <!-- hint -->
  <rect x="372" y="404" width="380" height="42" rx="4" fill="#1e2a1e"/>
  <text x="382" y="422" fill="#5b9bd5" font-family="Segoe UI,Arial,sans-serif" font-size="10" font-style="italic">po-tree-view — (p-selected) emite PoTreeViewItem ao clicar</text>
  <text x="382" y="438" fill="#5b9bd5" font-family="Segoe UI,Arial,sans-serif" font-size="10" font-style="italic">subItems[] para nós filhos — p-expanded controla estado inicial</text>
</svg>
