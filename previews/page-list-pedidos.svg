<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <defs>
    <clipPath id="rounded-frame">
      <rect width="800" height="480" rx="8"/>
    </clipPath>
  </defs>

  <g clip-path="url(#rounded-frame)">

    <!-- Background -->
    <rect width="800" height="480" fill="#1a1a1a"/>

    <!-- ── Toolbar ── -->
    <rect x="0" y="0" width="800" height="52" fill="#0C6C94"/>
    <text x="20" y="20" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.65)">Vendas / Pedidos</text>
    <text x="20" y="40" font-family="system-ui,sans-serif" font-size="17" font-weight="600" fill="#ffffff">Pedidos</text>
    <!-- Novo button -->
    <rect x="708" y="14" width="76" height="26" rx="4" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.45)" stroke-width="1"/>
    <text x="746" y="31" font-family="system-ui,sans-serif" font-size="12" font-weight="500" fill="#ffffff" text-anchor="middle">+ Novo</text>

    <!-- ── Search bar ── -->
    <rect x="0" y="52" width="800" height="44" fill="#141414"/>
    <!-- Search input -->
    <rect x="20" y="63" width="290" height="24" rx="4" fill="#252525" stroke="#353535" stroke-width="1"/>
    <circle cx="35" cy="75" r="5.5" fill="none" stroke="#666" stroke-width="1.4"/>
    <line x1="38.9" y1="79.0" x2="42.5" y2="82.5" stroke="#666" stroke-width="1.4" stroke-linecap="round"/>
    <text x="50" y="80" font-family="system-ui,sans-serif" font-size="12" fill="#4a4a4a">Pesquisar pedidos...</text>
    <!-- Filter button -->
    <rect x="320" y="63" width="76" height="24" rx="4" fill="#252525" stroke="#353535" stroke-width="1"/>
    <text x="358" y="79" font-family="system-ui,sans-serif" font-size="12" fill="#888" text-anchor="middle">Filtrar</text>

    <!-- ── Table header ── -->
    <rect x="0" y="96" width="800" height="34" fill="#232323"/>
    <text x="20"  y="118" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#777" letter-spacing="0.5">STATUS</text>
    <text x="185" y="118" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#777" letter-spacing="0.5">Nº PEDIDO</text>
    <text x="335" y="118" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#777" letter-spacing="0.5">DATA</text>
    <text x="480" y="118" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#777" letter-spacing="0.5">CLIENTE</text>
    <line x1="0" y1="130" x2="800" y2="130" stroke="#2a2a2a" stroke-width="1"/>

    <!-- ── Row 1 — Aprovado ── -->
    <rect x="0" y="130" width="800" height="41" fill="#1a1a1a"/>
    <circle cx="36" cy="151" r="6.5" fill="#4CAF50"/>
    <text x="52"  y="156" font-family="system-ui,sans-serif" font-size="13" fill="#d0d0d0">Aprovado</text>
    <text x="185" y="156" font-family="system-ui,sans-serif" font-size="13" fill="#d0d0d0">PED-0042</text>
    <text x="335" y="156" font-family="system-ui,sans-serif" font-size="13" fill="#d0d0d0">18/06/2026</text>
    <text x="480" y="156" font-family="system-ui,sans-serif" font-size="13" fill="#d0d0d0">Acme Ltda</text>
    <line x1="0" y1="171" x2="800" y2="171" stroke="#242424" stroke-width="1"/>

    <!-- ── Row 2 — Aberto ── -->
    <rect x="0" y="171" width="800" height="41" fill="#1e1e1e"/>
    <circle cx="36" cy="192" r="6.5" fill="#2196F3"/>
    <text x="52"  y="197" font-family="system-ui,sans-serif" font-size="13" fill="#d0d0d0">Aberto</text>
    <text x="185" y="197" font-family="system-ui,sans-serif" font-size="13" fill="#d0d0d0">PED-0041</text>
    <text x="335" y="197" font-family="system-ui,sans-serif" font-size="13" fill="#d0d0d0">17/06/2026</text>
    <text x="480" y="197" font-family="system-ui,sans-serif" font-size="13" fill="#d0d0d0">Beta S.A.</text>
    <line x1="0" y1="212" x2="800" y2="212" stroke="#242424" stroke-width="1"/>

    <!-- ── Row 3 — Pendente ── -->
    <rect x="0" y="212" width="800" height="41" fill="#1a1a1a"/>
    <circle cx="36" cy="233" r="6.5" fill="#FFC107"/>
    <text x="52"  y="238" font-family="system-ui,sans-serif" font-size="13" fill="#d0d0d0">Pendente</text>
    <text x="185" y="238" font-family="system-ui,sans-serif" font-size="13" fill="#d0d0d0">PED-0040</text>
    <text x="335" y="238" font-family="system-ui,sans-serif" font-size="13" fill="#d0d0d0">17/06/2026</text>
    <text x="480" y="238" font-family="system-ui,sans-serif" font-size="13" fill="#d0d0d0">Gama ME</text>
    <line x1="0" y1="253" x2="800" y2="253" stroke="#242424" stroke-width="1"/>

    <!-- ── Row 4 — Fechado ── -->
    <rect x="0" y="253" width="800" height="41" fill="#1e1e1e"/>
    <circle cx="36" cy="274" r="6.5" fill="#9E9E9E"/>
    <text x="52"  y="279" font-family="system-ui,sans-serif" font-size="13" fill="#d0d0d0">Fechado</text>
    <text x="185" y="279" font-family="system-ui,sans-serif" font-size="13" fill="#d0d0d0">PED-0039</text>
    <text x="335" y="279" font-family="system-ui,sans-serif" font-size="13" fill="#d0d0d0">16/06/2026</text>
    <text x="480" y="279" font-family="system-ui,sans-serif" font-size="13" fill="#d0d0d0">Delta Co</text>
    <line x1="0" y1="294" x2="800" y2="294" stroke="#2a2a2a" stroke-width="1"/>

    <!-- ── Pagination ── -->
    <rect x="0" y="294" width="800" height="40" fill="#141414"/>
    <text x="20" y="319" font-family="system-ui,sans-serif" font-size="12" fill="#555">Mostrando 1–4 de 4 registros</text>
    <rect x="678" y="307" width="28" height="22" rx="3" fill="#252525" stroke="#353535" stroke-width="1"/>
    <text x="692" y="323" font-family="system-ui,sans-serif" font-size="13" fill="#666" text-anchor="middle">‹</text>
    <rect x="714" y="307" width="28" height="22" rx="3" fill="#252525" stroke="#353535" stroke-width="1"/>
    <text x="728" y="323" font-family="system-ui,sans-serif" font-size="13" fill="#666" text-anchor="middle">›</text>
    <line x1="0" y1="334" x2="800" y2="334" stroke="#2a2a2a" stroke-width="1"/>

    <!-- ── Caption ── -->
    <rect x="0" y="334" width="800" height="146" fill="#141414"/>
    <text x="400" y="418" font-family="ui-monospace,monospace" font-size="12" fill="#444" text-anchor="middle">/poui-specialist:generate page-list Pedidos --module vendas</text>

  </g>

  <!-- Border -->
  <rect x="0.5" y="0.5" width="799" height="479" rx="7.5" fill="none" stroke="#2a2a2a" stroke-width="1"/>
</svg>
