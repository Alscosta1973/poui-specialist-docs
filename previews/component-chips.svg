<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <!-- Background -->
  <rect width="800" height="480" fill="#1a1a1a"/>
  <!-- Toolbar -->
  <rect width="800" height="52" fill="#2c6fad"/>
  <text x="20" y="33" fill="white" font-family="Segoe UI,Arial,sans-serif" font-size="16" font-weight="600">Cadastro de Habilidades</text>
  <!-- Body -->
  <rect x="0" y="52" width="800" height="428" fill="#1e1e1e"/>

  <!-- Form card -->
  <rect x="16" y="70" width="768" height="392" rx="6" fill="#242424" stroke="#353535" stroke-width="1"/>

  <!-- Section: po-chips input -->
  <text x="36" y="104" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="11">Tecnologias *</text>
  <!-- Chips container input box -->
  <rect x="36" y="110" width="500" height="46" rx="4" fill="#1e1e1e" stroke="#2c6fad" stroke-width="1.5"/>
  <!-- Added chips inside the input -->
  <rect x="46" y="121" width="62" height="24" rx="12" fill="#2c6fad"/>
  <text x="77" y="137" fill="white" font-family="Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">Angular</text>
  <text x="102" y="137" fill="white" font-family="Segoe UI,Arial,sans-serif" font-size="12">✕</text>

  <rect x="116" y="121" width="68" height="24" rx="12" fill="#2c6fad"/>
  <text x="150" y="137" fill="white" font-family="Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">TypeScript</text>
  <text x="177" y="137" fill="white" font-family="Segoe UI,Arial,sans-serif" font-size="12">✕</text>

  <rect x="192" y="121" width="54" height="24" rx="12" fill="#2c6fad"/>
  <text x="219" y="137" fill="white" font-family="Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">PO-UI</text>
  <text x="239" y="137" fill="white" font-family="Segoe UI,Arial,sans-serif" font-size="12">✕</text>
  <!-- Cursor in input -->
  <text x="256" y="137" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="12">Node.js_</text>

  <text x="36" y="168" fill="#5b9bd5" font-family="Segoe UI,Arial,sans-serif" font-size="10" font-style="italic">po-chips — retorna string[] ao adicionar/remover chips · (p-change)</text>

  <!-- Divider -->
  <line x1="36" y1="182" x2="764" y2="182" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Section: po-chips with separator (email example) -->
  <text x="36" y="206" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="11">E-mails dos Aprovadores</text>
  <rect x="36" y="212" width="500" height="46" rx="4" fill="#1e1e1e" stroke="#353535" stroke-width="1"/>
  <rect x="46" y="223" width="148" height="24" rx="12" fill="#333"/>
  <text x="120" y="239" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">gerente@empresa.com</text>
  <text x="188" y="239" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="12">✕</text>

  <rect x="202" y="223" width="136" height="24" rx="12" fill="#333"/>
  <text x="270" y="239" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">rh@empresa.com</text>
  <text x="332" y="239" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="12">✕</text>
  <text x="356" y="239" fill="#555" font-family="Segoe UI,Arial,sans-serif" font-size="11">Digite e pressione Enter ou vírgula...</text>

  <text x="36" y="270" fill="#5b9bd5" font-family="Segoe UI,Arial,sans-serif" font-size="10" font-style="italic">p-separator="," — permite vírgula como separador além do Enter</text>

  <!-- Divider -->
  <line x1="36" y1="284" x2="764" y2="284" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Chips display (readonly filter chips) -->
  <text x="36" y="308" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="600">Filtros ativos</text>
  <!-- Filter chips row -->
  <rect x="36" y="318" width="80" height="28" rx="14" fill="#1e2a3a" stroke="#2c6fad" stroke-width="1"/>
  <text x="76" y="336" fill="#5b9bd5" font-family="Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">Angular ✕</text>

  <rect x="124" y="318" width="100" height="28" rx="14" fill="#1e2a3a" stroke="#2c6fad" stroke-width="1"/>
  <text x="174" y="336" fill="#5b9bd5" font-family="Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">TypeScript ✕</text>

  <rect x="232" y="318" width="82" height="28" rx="14" fill="#1a2a1a" stroke="#37a337" stroke-width="1"/>
  <text x="273" y="336" fill="#37a337" font-family="Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">Ativo ✕</text>

  <text x="36" y="366" fill="#5b9bd5" font-family="Segoe UI,Arial,sans-serif" font-size="10" font-style="italic">Chips como filtros visuais — combine com po-disclaimer-group para gerenciamento de filtros</text>

  <!-- Action buttons -->
  <rect x="36" y="418" width="768" height="1" fill="#353535"/>
  <rect x="624" y="428" width="80" height="30" rx="4" fill="transparent" stroke="#353535" stroke-width="1"/>
  <text x="664" y="448" fill="#aaa" font-family="Segoe UI,Arial,sans-serif" font-size="13" text-anchor="middle">Cancelar</text>
  <rect x="714" y="428" width="66" height="30" rx="4" fill="#2c6fad"/>
  <text x="747" y="448" fill="white" font-family="Segoe UI,Arial,sans-serif" font-size="13" text-anchor="middle">Salvar</text>
</svg>
