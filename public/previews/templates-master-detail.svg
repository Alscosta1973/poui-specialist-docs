  <line x1="16" y1="320" x2="784" y2="320" stroke="#2a2a2a" stroke-width="1"/>
  <text x="26" y="305" fill="#555" font-family="Segoe UI,Arial,sans-serif" font-size="12">▶</text>
  <text x="52"  y="305" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13">PED-002</text>
  <text x="180" y="305" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13">Distribuidora Beta S/A</text>
  <text x="430" y="305" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13">22/01/2026</text>
  <text x="560" y="305" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13">R$ 1.080,00</text>
  <circle cx="678" cy="300" r="5" fill="#ff9800"/>
  <text x="691" y="305" fill="#ff9800" font-family="Segoe UI,Arial,sans-serif" font-size="12">Pendente</text>

