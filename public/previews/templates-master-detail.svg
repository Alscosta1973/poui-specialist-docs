  <!-- Page body -->
  <rect x="0" y="52" width="800" height="368" fill="#1e1e1e"/>

  <!-- Quick search -->
  <rect x="16" y="72" width="300" height="34" rx="4" fill="#252525" stroke="#353535" stroke-width="1"/>
  <text x="32" y="94" fill="#555" font-family="Segoe UI,Arial,sans-serif" font-size="13">Pesquisa rápida...</text>

  <!-- Master table header -->
  <rect x="16" y="122" width="768" height="36" rx="3" fill="#252525"/>
  <text x="52"  y="145" fill="#999" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="600">Pedido</text>
  <text x="180" y="145" fill="#999" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="600">Cliente</text>
