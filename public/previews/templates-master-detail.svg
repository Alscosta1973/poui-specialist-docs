  <text x="300" y="271" fill="#c0d8e8" font-family="Segoe UI,Arial,sans-serif" font-size="12">5</text>
  <text x="400" y="271" fill="#c0d8e8" font-family="Segoe UI,Arial,sans-serif" font-size="12">R$ 130,00</text>
  <text x="540" y="271" fill="#c0d8e8" font-family="Segoe UI,Arial,sans-serif" font-size="12">R$ 650,00</text>

