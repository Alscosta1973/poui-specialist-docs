  <text x="180" y="183" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13">Empresa Alpha Ltda</text>
  <text x="430" y="183" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13">15/01/2026</text>
  <text x="560" y="183" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13">R$ 4.250,00</text>
  <circle cx="678" cy="178" r="5" fill="#4caf50"/>
  <text x="691" y="183" fill="#4caf50" font-family="Segoe UI,Arial,sans-serif" font-size="12">Ativo</text>

