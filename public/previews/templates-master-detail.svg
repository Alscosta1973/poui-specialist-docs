  <text x="670" y="145" fill="#999" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="600">Status</text>

  <!-- Master Row 1 — EXPANDED -->
  <rect x="16" y="158" width="768" height="40" fill="#1e1e1e"/>
  <line x1="16" y1="198" x2="784" y2="198" stroke="#2a2a2a" stroke-width="1"/>
