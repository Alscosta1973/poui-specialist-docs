  <text x="540" y="215" fill="#7ab3d4" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="600">Subtotal</text>

  <rect x="32" y="224" width="752" height="28" fill="#152030"/>
  <line x1="32" y1="252" x2="784" y2="252" stroke="#1e3040" stroke-width="1"/>
  <text x="60"  y="243" fill="#c0d8e8" font-family="Segoe UI,Arial,sans-serif" font-size="12">Notebook Pro 15"</text>
  <text x="300" y="243" fill="#c0d8e8" font-family="Segoe UI,Arial,sans-serif" font-size="12">2</text>
  <text x="400" y="243" fill="#c0d8e8" font-family="Segoe UI,Arial,sans-serif" font-size="12">R$ 1.800,00</text>
  <text x="540" y="243" fill="#c0d8e8" font-family="Segoe UI,Arial,sans-serif" font-size="12">R$ 3.600,00</text>

