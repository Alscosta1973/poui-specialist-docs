  <rect x="16" y="320" width="768" height="40" fill="#1e1e1e"/>
  <line x1="16" y1="360" x2="784" y2="360" stroke="#2a2a2a" stroke-width="1"/>
  <text x="26" y="345" fill="#555" font-family="Segoe UI,Arial,sans-serif" font-size="12">▶</text>
  <text x="52"  y="345" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13">PED-003</text>
  <text x="180" y="345" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13">Comércio Gama ME</text>
  <text x="430" y="345" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13">30/01/2026</text>
  <text x="560" y="345" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13">R$ 720,00</text>
