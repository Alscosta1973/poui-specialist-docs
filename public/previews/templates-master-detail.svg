  <text x="691" y="345" fill="#4caf50" font-family="Segoe UI,Arial,sans-serif" font-size="12">Ativo</text>

  <!-- Pagination -->
  <rect x="0" y="420" width="800" height="60" fill="#1a1a1a"/>
  <line x1="0" y1="420" x2="800" y2="420" stroke="#353535" stroke-width="1"/>
  <text x="30" y="457" fill="#666" font-family="Segoe UI,Arial,sans-serif" font-size="13">1 - 3 de 8 itens</text>
  <rect x="624" y="436" width="32" height="26" rx="4" fill="#252525" stroke="#353535" stroke-width="1"/>
  <text x="640" y="454" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="14" text-anchor="middle">‹</text>
  <rect x="662" y="436" width="32" height="26" rx="4" fill="#2c6fad"/>
  <text x="678" y="454" fill="white" font-family="Segoe UI,Arial,sans-serif" font-size="13" text-anchor="middle">1</text>
  <rect x="700" y="436" width="32" height="26" rx="4" fill="#252525" stroke="#353535" stroke-width="1"/>
  <text x="716" y="454" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="13" text-anchor="middle">2</text>
  <rect x="738" y="436" width="32" height="26" rx="4" fill="#252525" stroke="#353535" stroke-width="1"/>
  <text x="754" y="454" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="14" text-anchor="middle">›</text>
