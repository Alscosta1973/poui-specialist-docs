  <line x1="16" y1="352" x2="784" y2="352" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="26" y="327" width="12" height="12" rx="2" fill="none" stroke="#555" stroke-width="1.5"/>
  <text x="48"  y="340" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="12">Mouse Sem Fio</text>
  <text x="260" y="340" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="12">5</text>
  <text x="360" y="340" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="12">R$ 130,00</text>
  <text x="500" y="340" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="12">R$ 650,00</text>
  <circle cx="648" cy="335" r="4" fill="#ff9800"/>
  <text x="660" y="340" fill="#ff9800" font-family="Segoe UI,Arial,sans-serif" font-size="12">Pendente</text>

  <!-- Detail Row 3 -->
  <rect x="16" y="352" width="768" height="34" fill="#1e1e1e"/>
  <line x1="16" y1="386" x2="784" y2="386" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="26" y="361" width="12" height="12" rx="2" fill="none" stroke="#555" stroke-width="1.5"/>
  <text x="48"  y="374" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="12">Cabo HDMI 2m</text>
  <text x="260" y="374" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="12">3</text>
  <text x="360" y="374" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="12">R$ 45,00</text>
  <text x="500" y="374" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="12">R$ 135,00</text>
  <circle cx="648" cy="369" r="4" fill="#4caf50"/>
  <text x="660" y="374" fill="#4caf50" font-family="Segoe UI,Arial,sans-serif" font-size="12">Entregue</text>

