  <!-- Filter bar -->
  <rect x="16" y="84" width="210" height="28" rx="4" fill="#252525" stroke="#353535" stroke-width="1"/>
  <text x="28" y="103" fill="#555" font-family="Segoe UI,Arial,sans-serif" font-size="12">Filtrar...</text>
  <rect x="234" y="84" width="100" height="28" rx="4" fill="transparent" stroke="#353535" stroke-width="1"/>
  <text x="284" y="103" fill="#666" font-family="Segoe UI,Arial,sans-serif" font-size="12" text-anchor="middle">Remover Filtro</text>

