  <line x1="0" y1="420" x2="800" y2="420" stroke="#353535" stroke-width="1"/>
  <text x="30" y="448" fill="#555" font-family="Segoe UI,Arial,sans-serif" font-size="12">↑ ↓  navega no master   ·   Tab  alterna foco entre browses   ·   1 item selecionado no detalhe</text>
</svg>
