  <text x="260" y="274" fill="#999" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="600">Qtd</text>
  <text x="360" y="274" fill="#999" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="600">Unitário</text>
