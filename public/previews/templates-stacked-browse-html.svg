  <line x1="16" y1="318" x2="784" y2="318" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="26" y="293" width="12" height="12" rx="2" fill="#2c6fad"/>
  <text x="30" y="302" fill="white" font-family="Segoe UI,Arial,sans-serif" font-size="7">✓</text>
  <text x="48"  y="306" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="12">Notebook Pro 15"</text>
  <text x="260" y="306" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="12">2</text>
  <text x="360" y="306" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="12">R$ 1.800,00</text>
  <text x="500" y="306" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="12">R$ 3.600,00</text>
