  <text x="560" y="138" fill="#999" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="600">Total</text>
  <text x="680" y="138" fill="#999" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="600">Status</text>

  <!-- Master Row 1 — SELECTED -->
  <rect x="16" y="148" width="768" height="34" fill="#1b2d3f"/>
  <line x1="16" y1="182" x2="784" y2="182" stroke="#2c6fad" stroke-width="1" opacity="0.5"/>
  <text x="30"  y="170" fill="#7ab3d4" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="600">PED-001</text>
  <text x="130" y="170" fill="#c0d8e8" font-family="Segoe UI,Arial,sans-serif" font-size="13">Empresa Alpha Ltda</text>
  <text x="420" y="170" fill="#c0d8e8" font-family="Segoe UI,Arial,sans-serif" font-size="13">15/01/2026</text>
  <text x="560" y="170" fill="#c0d8e8" font-family="Segoe UI,Arial,sans-serif" font-size="13">R$ 4.250,00</text>
  <circle cx="688" cy="165" r="4" fill="#4caf50"/>
  <text x="700" y="170" fill="#4caf50" font-family="Segoe UI,Arial,sans-serif" font-size="12">Ativo</text>

