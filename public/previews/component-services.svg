<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <rect width="800" height="480" fill="#1a1a1a"/>
  <rect width="800" height="52" fill="#2c6fad"/>
  <text x="20" y="33" fill="white" font-family="Segoe UI,Arial,sans-serif" font-size="16" font-weight="600">Serviços PO-UI — HTTP, Theme e I18n</text>
  <rect x="0" y="52" width="800" height="428" fill="#1e1e1e"/>

  <!-- === PoHttpInterceptorService === -->
  <rect x="16" y="70" width="368" height="200" rx="6" fill="#242424" stroke="#353535" stroke-width="1"/>
  <text x="36" y="96" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="600">PoHttpInterceptorService</text>
  <text x="36" y="112" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="10">Loading overlay automático em requisições HTTP</text>

  <!-- Loading overlay on top of content -->
  <rect x="36" y="122" width="328" height="130" rx="4" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="1"/>
  <!-- Dimmed content behind -->
  <text x="80" y="148" fill="#333" font-family="Segoe UI,Arial,sans-serif" font-size="11">Código</text>
  <text x="200" y="148" fill="#333" font-family="Segoe UI,Arial,sans-serif" font-size="11">Descrição</text>
  <text x="80" y="168" fill="#333" font-family="Segoe UI,Arial,sans-serif" font-size="11">PC-0001</text>
  <text x="200" y="168" fill="#333" font-family="Segoe UI,Arial,sans-serif" font-size="11">Pedido Alpha</text>
  <!-- Overlay semi-transparent -->
  <rect x="36" y="122" width="328" height="130" rx="4" fill="#1a1a1a" opacity="0.7"/>
  <!-- Spinner -->
  <circle cx="200" cy="183" r="18" fill="none" stroke="#353535" stroke-width="3"/>
  <path d="M 200 165 A 18 18 0 0 1 218 183" stroke="#2c6fad" stroke-width="3" fill="none" stroke-linecap="round"/>
  <text x="200" y="220" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Carregando...</text>
  <text x="36" y="264" fill="#5b9bd5" font-family="Segoe UI,Arial,sans-serif" font-size="9" font-style="italic">Automático: qualquer HttpClient request ativa o overlay</text>

  <!-- === PoThemeService === -->
  <rect x="416" y="70" width="368" height="200" rx="6" fill="#242424" stroke="#353535" stroke-width="1"/>
  <text x="436" y="96" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="600">PoThemeService</text>
  <text x="436" y="112" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="10">Troca de tema programática (light / dark / custom)</text>

  <!-- Theme toggle buttons -->
  <rect x="436" y="124" width="160" height="36" rx="4" fill="#1e1e1e" stroke="#2c6fad" stroke-width="1.5"/>
  <text x="436" y="142" fill="white" font-family="Segoe UI,Arial,sans-serif" font-size="11" text-anchor="start"/>
  <rect x="436" y="124" width="80" height="36" rx="4" fill="#2c6fad"/>
  <text x="476" y="146" fill="white" font-family="Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">🌙 Dark</text>
  <text x="556" y="146" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">☀️ Light</text>

  <!-- Dark theme preview -->
  <rect x="436" y="170" width="160" height="80" rx="4" fill="#1a1a1a" stroke="#2c6fad" stroke-width="1"/>
  <rect x="436" y="170" width="160" height="24" fill="#2c6fad"/>
  <text x="516" y="186" fill="white" font-family="Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Toolbar dark</text>
  <text x="450" y="214" fill="#aaa" font-family="Segoe UI,Arial,sans-serif" font-size="10">Campo escuro</text>
  <rect x="450" y="220" width="132" height="18" rx="3" fill="#242424" stroke="#353535" stroke-width="1"/>

  <!-- Light theme preview -->
  <rect x="608" y="170" width="160" height="80" rx="4" fill="#f5f5f5" stroke="#353535" stroke-width="1"/>
  <rect x="608" y="170" width="160" height="24" fill="#2c6fad"/>
  <text x="688" y="186" fill="white" font-family="Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Toolbar light</text>
  <text x="622" y="214" fill="#333" font-family="Segoe UI,Arial,sans-serif" font-size="10">Campo claro</text>
  <rect x="622" y="220" width="132" height="18" rx="3" fill="white" stroke="#ccc" stroke-width="1"/>

  <text x="436" y="264" fill="#5b9bd5" font-family="Segoe UI,Arial,sans-serif" font-size="9" font-style="italic">changeTheme(theme) · changeCurrentTheme() · tokens CSS customizáveis</text>

  <!-- === PoI18nService === -->
  <rect x="16" y="284" width="768" height="168" rx="6" fill="#242424" stroke="#353535" stroke-width="1"/>
  <text x="36" y="310" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="600">PoI18nService</text>
  <text x="36" y="326" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="10">Internacionalização — carregamento de literais por idioma e contexto</text>

  <!-- Language selector buttons -->
  <rect x="36" y="338" width="52" height="26" rx="13" fill="#2c6fad"/>
  <text x="62" y="355" fill="white" font-family="Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle" font-weight="600">PT</text>
  <rect x="96" y="338" width="52" height="26" rx="13" fill="transparent" stroke="#353535" stroke-width="1"/>
  <text x="122" y="355" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">EN</text>
  <rect x="156" y="338" width="52" height="26" rx="13" fill="transparent" stroke="#353535" stroke-width="1"/>
  <text x="182" y="355" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">ES</text>

  <!-- i18n text example -->
  <rect x="300" y="334" width="460" height="100" rx="4" fill="#1e1e1e"/>
  <text x="316" y="352" fill="#888" font-family="monospace,Consolas" font-size="10">// literais.pt.json</text>
  <text x="316" y="368" fill="#5b9bd5" font-family="monospace,Consolas" font-size="10">\{ "salvar": "Salvar", "cancelar": "Cancelar", "confirmar": "Confirmar" \}</text>
  <text x="316" y="390" fill="#888" font-family="monospace,Consolas" font-size="10">// component.ts</text>
  <text x="316" y="406" fill="#5b9bd5" font-family="monospace,Consolas" font-size="10">this.i18n.getLiterals().subscribe(lit => this.literals = lit);</text>
  <text x="316" y="422" fill="#888" font-family="monospace,Consolas" font-size="10">// template: \{\{ literals.salvar \}\}</text>

  <text x="36" y="440" fill="#5b9bd5" font-family="Segoe UI,Arial,sans-serif" font-size="9" font-style="italic">providePoI18n() — contextos por feature, lazy-loaded, cache por idioma</text>
</svg>
