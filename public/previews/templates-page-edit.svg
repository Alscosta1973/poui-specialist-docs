<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <!-- Background -->
  <rect width="800" height="480" fill="#1a1a1a"/>

  <!-- Toolbar -->
  <rect width="800" height="52" fill="#2c6fad"/>
  <text x="20" y="33" fill="white" font-family="Segoe UI,Arial,sans-serif" font-size="16" font-weight="600">Editar Produto</text>

  <!-- Page body -->
  <rect x="0" y="52" width="800" height="428" fill="#1e1e1e"/>

  <!-- Page action bar (po-page-edit has save/cancel at top) -->
  <rect x="0" y="52" width="800" height="48" fill="#252525"/>
  <line x1="0" y1="100" x2="800" y2="100" stroke="#353535" stroke-width="1"/>
  <rect x="650" y="62" width="70" height="28" rx="4" fill="transparent" stroke="#353535" stroke-width="1"/>
  <text x="685" y="81" fill="#aaa" font-family="Segoe UI,Arial,sans-serif" font-size="13" text-anchor="middle">Cancelar</text>
  <rect x="728" y="62" width="56" height="28" rx="4" fill="#2c6fad"/>
  <text x="756" y="81" fill="white" font-family="Segoe UI,Arial,sans-serif" font-size="13" text-anchor="middle">Salvar</text>

  <!-- Section: Dados Gerais -->
  <text x="24" y="130" fill="#7ab3d4" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="600">Dados Gerais</text>
  <line x1="24" y1="135" x2="776" y2="135" stroke="#2c6fad" stroke-width="1" opacity="0.4"/>

  <!-- Row 1: Código + Descrição -->
  <text x="24" y="158" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="11">Código *</text>
  <rect x="24" y="163" width="160" height="32" rx="4" fill="#1a1a1a" stroke="#353535" stroke-width="1"/>
  <text x="36" y="184" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13">PRD-0042</text>

  <text x="200" y="158" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="11">Descrição *</text>
  <rect x="200" y="163" width="576" height="32" rx="4" fill="#1a1a1a" stroke="#2c6fad" stroke-width="1.5"/>
  <text x="212" y="184" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13">Monitor Ultrawide 34"</text>

  <!-- Row 2: Grupo + Unidade + Tipo -->
  <text x="24" y="216" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="11">Grupo</text>
  <rect x="24" y="221" width="230" height="32" rx="4" fill="#1a1a1a" stroke="#353535" stroke-width="1"/>
  <text x="36" y="242" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13">Informática</text>
  <text x="238" y="242" fill="#555" font-family="Segoe UI,Arial,sans-serif" font-size="14">▾</text>

  <text x="270" y="216" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="11">Unidade</text>
  <rect x="270" y="221" width="120" height="32" rx="4" fill="#1a1a1a" stroke="#353535" stroke-width="1"/>
  <text x="282" y="242" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13">UN</text>
  <text x="374" y="242" fill="#555" font-family="Segoe UI,Arial,sans-serif" font-size="14">▾</text>

  <text x="406" y="216" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="11">Tipo</text>
  <rect x="406" y="221" width="160" height="32" rx="4" fill="#1a1a1a" stroke="#353535" stroke-width="1"/>
  <text x="418" y="242" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13">Mercadoria</text>
  <text x="550" y="242" fill="#555" font-family="Segoe UI,Arial,sans-serif" font-size="14">▾</text>

  <text x="580" y="216" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="11">Status</text>
  <rect x="580" y="221" width="196" height="32" rx="4" fill="#1a1a1a" stroke="#353535" stroke-width="1"/>
  <text x="592" y="242" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13">Ativo</text>
  <text x="760" y="242" fill="#555" font-family="Segoe UI,Arial,sans-serif" font-size="14">▾</text>

  <!-- Section: Valores -->
  <text x="24" y="278" fill="#7ab3d4" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="600">Valores</text>
  <line x1="24" y1="283" x2="776" y2="283" stroke="#2c6fad" stroke-width="1" opacity="0.4"/>

  <!-- Row 3: Preço Custo + Preço Venda + Margem -->
  <text x="24" y="306" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="11">Preço de Custo</text>
  <rect x="24" y="311" width="230" height="32" rx="4" fill="#1a1a1a" stroke="#353535" stroke-width="1"/>
  <text x="36" y="332" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13">R$ 1.200,00</text>

  <text x="270" y="306" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="11">Preço de Venda</text>
  <rect x="270" y="311" width="230" height="32" rx="4" fill="#1a1a1a" stroke="#353535" stroke-width="1"/>
  <text x="282" y="332" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13">R$ 1.899,90</text>

  <text x="516" y="306" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="11">Margem (%)</text>
  <rect x="516" y="311" width="260" height="32" rx="4" fill="#1a1a1a" stroke="#353535" stroke-width="1"/>
  <text x="528" y="332" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13">58,3</text>

  <!-- Section: Observações -->
  <text x="24" y="366" fill="#7ab3d4" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="600">Observações</text>
  <line x1="24" y1="371" x2="776" y2="371" stroke="#2c6fad" stroke-width="1" opacity="0.4"/>

  <!-- Textarea -->
  <rect x="24" y="381" width="752" height="72" rx="4" fill="#1a1a1a" stroke="#353535" stroke-width="1"/>
  <text x="36" y="402" fill="#555" font-family="Segoe UI,Arial,sans-serif" font-size="13">Produto importado. Verificar disponibilidade de estoque antes de confirmar pedido.</text>
</svg>
