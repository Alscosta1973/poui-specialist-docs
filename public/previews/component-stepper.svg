<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <!-- Background -->
  <rect width="800" height="480" fill="#1a1a1a"/>

  <!-- Toolbar -->
  <rect width="800" height="52" fill="#2c6fad"/>
  <text x="20" y="33" fill="white" font-family="Segoe UI,Arial,sans-serif" font-size="16" font-weight="600">Cadastro de Fornecedor</text>

  <!-- Page body -->
  <rect x="0" y="52" width="800" height="428" fill="#1e1e1e"/>

  <!-- Page title + breadcrumb -->
  <text x="20" y="82" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="12">Fornecedores › Novo Fornecedor</text>
  <text x="20" y="102" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="18" font-weight="600">Novo Fornecedor</text>

  <!-- Stepper track (horizontal) -->
  <!-- Step 1 — Done -->
  <circle cx="160" cy="138" r="16" fill="#2c6fad"/>
  <text x="160" y="143" fill="white" font-family="Segoe UI,Arial,sans-serif" font-size="13" text-anchor="middle">✓</text>
  <text x="160" y="165" fill="#2c6fad" font-family="Segoe UI,Arial,sans-serif" font-size="12" text-anchor="middle">Identificação</text>

  <!-- Connector 1→2 done -->
  <line x1="176" y1="138" x2="304" y2="138" stroke="#2c6fad" stroke-width="2"/>

  <!-- Step 2 — Active -->
  <circle cx="320" cy="138" r="16" fill="#2c6fad" stroke="#5b9bd5" stroke-width="2"/>
  <text x="320" y="143" fill="white" font-family="Segoe UI,Arial,sans-serif" font-size="13" text-anchor="middle" font-weight="600">2</text>
  <text x="320" y="165" fill="#5b9bd5" font-family="Segoe UI,Arial,sans-serif" font-size="12" text-anchor="middle" font-weight="600">Endereço</text>

  <!-- Connector 2→3 pending -->
  <line x1="336" y1="138" x2="464" y2="138" stroke="#444" stroke-width="2"/>

  <!-- Step 3 — Default -->
  <circle cx="480" cy="138" r="16" fill="#333" stroke="#444" stroke-width="2"/>
  <text x="480" y="143" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="13" text-anchor="middle">3</text>
  <text x="480" y="165" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="12" text-anchor="middle">Dados Fiscais</text>

  <!-- Connector 3→4 pending -->
  <line x1="496" y1="138" x2="624" y2="138" stroke="#444" stroke-width="2"/>

  <!-- Step 4 — Default -->
  <circle cx="640" cy="138" r="16" fill="#333" stroke="#444" stroke-width="2"/>
  <text x="640" y="143" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="13" text-anchor="middle">4</text>
  <text x="640" y="165" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="12" text-anchor="middle">Confirmação</text>

  <!-- Step content area (step 2 — Endereço) -->
  <rect x="16" y="180" width="768" height="240" rx="6" fill="#242424" stroke="#353535" stroke-width="1"/>

  <!-- Step 2 title -->
  <text x="36" y="210" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="15" font-weight="600">Endereço</text>
  <line x1="16" y1="222" x2="784" y2="222" stroke="#353535" stroke-width="1"/>

  <!-- Form fields -->
  <!-- CEP -->
  <text x="36" y="246" fill="#aaa" font-family="Segoe UI,Arial,sans-serif" font-size="12">CEP *</text>
  <rect x="36" y="252" width="140" height="32" rx="4" fill="#1e1e1e" stroke="#353535" stroke-width="1"/>
  <text x="48" y="273" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13">01310-100</text>

  <!-- Logradouro -->
  <text x="196" y="246" fill="#aaa" font-family="Segoe UI,Arial,sans-serif" font-size="12">Logradouro *</text>
  <rect x="196" y="252" width="360" height="32" rx="4" fill="#1e1e1e" stroke="#2c6fad" stroke-width="1.5"/>
  <text x="208" y="273" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13">Av. Paulista</text>

  <!-- Número -->
  <text x="570" y="246" fill="#aaa" font-family="Segoe UI,Arial,sans-serif" font-size="12">Número</text>
  <rect x="570" y="252" width="100" height="32" rx="4" fill="#1e1e1e" stroke="#353535" stroke-width="1"/>
  <text x="582" y="273" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13">1000</text>

  <!-- Cidade -->
  <text x="36" y="308" fill="#aaa" font-family="Segoe UI,Arial,sans-serif" font-size="12">Cidade *</text>
  <rect x="36" y="314" width="250" height="32" rx="4" fill="#1e1e1e" stroke="#353535" stroke-width="1"/>
  <text x="48" y="335" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13">São Paulo</text>

  <!-- UF -->
  <text x="300" y="308" fill="#aaa" font-family="Segoe UI,Arial,sans-serif" font-size="12">UF</text>
  <rect x="300" y="314" width="100" height="32" rx="4" fill="#1e1e1e" stroke="#353535" stroke-width="1"/>
  <text x="312" y="335" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13">SP</text>
  <text x="386" y="335" fill="#666" font-family="Segoe UI,Arial,sans-serif" font-size="14">▾</text>

  <!-- Bairro -->
  <text x="416" y="308" fill="#aaa" font-family="Segoe UI,Arial,sans-serif" font-size="12">Bairro</text>
  <rect x="416" y="314" width="354" height="32" rx="4" fill="#1e1e1e" stroke="#353535" stroke-width="1"/>
  <text x="428" y="335" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13">Bela Vista</text>

  <!-- Navigation buttons -->
  <rect x="16" y="434" width="768" height="1" fill="#353535"/>
  <!-- Anterior -->
  <rect x="36"  y="444" width="100" height="30" rx="4" fill="transparent" stroke="#353535" stroke-width="1"/>
  <text x="86"  y="464" fill="#aaa" font-family="Segoe UI,Arial,sans-serif" font-size="13" text-anchor="middle">‹ Anterior</text>
  <!-- Próximo -->
  <rect x="664" y="444" width="100" height="30" rx="4" fill="#2c6fad"/>
  <text x="714" y="464" fill="white" font-family="Segoe UI,Arial,sans-serif" font-size="13" text-anchor="middle">Próximo ›</text>
</svg>
