<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <rect width="800" height="480" fill="#1a1a1a"/>
  <!-- Toolbar -->
  <rect width="800" height="52" fill="#2c6fad"/>
  <text x="20" y="33" fill="white" font-family="Segoe UI,Arial,sans-serif" font-size="16" font-weight="600">Consulta de Produtos</text>

  <!-- Body -->
  <rect x="0" y="52" width="800" height="428" fill="#1e1e1e"/>

  <!-- Search bar area -->
  <rect x="16" y="70" width="768" height="60" rx="6" fill="#242424" stroke="#353535" stroke-width="1"/>

  <!-- Search input with focus -->
  <rect x="36" y="82" width="480" height="36" rx="18" fill="#1e1e1e" stroke="#2c6fad" stroke-width="1.5"/>
  <text x="58" y="105" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="16">🔍</text>
  <text x="82" y="105" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13">notebook</text>
  <rect x="384" y="90" width="1" height="20" fill="#2c6fad"/>

  <!-- Search button (action type) -->
  <rect x="528" y="82" width="100" height="36" rx="18" fill="#2c6fad"/>
  <text x="578" y="105" fill="white" font-family="Segoe UI,Arial,sans-serif" font-size="13" text-anchor="middle" font-weight="600">Buscar</text>

  <!-- Label hint -->
  <text x="648" y="96" fill="#555" font-family="Segoe UI,Arial,sans-serif" font-size="10" font-style="italic">p-search-type="action"</text>
  <text x="648" y="110" fill="#555" font-family="Segoe UI,Arial,sans-serif" font-size="10" font-style="italic">busca ao pressionar Enter</text>

  <!-- Autocomplete dropdown -->
  <rect x="36" y="119" width="480" height="200" rx="6" fill="#242424" stroke="#2c6fad" stroke-width="1"/>

  <!-- Dropdown header -->
  <text x="50" y="140" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="11">Sugestões</text>
  <line x1="36" y1="147" x2="516" y2="147" stroke="#353535" stroke-width="1"/>

  <!-- Autocomplete items -->
  <!-- Item 1 - highlighted -->
  <rect x="36" y="148" width="480" height="36" fill="#1e2a3a"/>
  <text x="58" y="171" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="13">💻</text>
  <text x="80" y="171" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13">Notebook Dell Inspiron 15</text>
  <text x="420" y="171" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="11">SKU-0041</text>

  <!-- Item 2 -->
  <rect x="36" y="184" width="480" height="36" fill="transparent"/>
  <text x="58" y="207" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="13">💻</text>
  <text x="80" y="207" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="13">Notebook Lenovo ThinkPad E14</text>
  <text x="420" y="207" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="11">SKU-0055</text>
  <line x1="50" y1="220" x2="506" y2="220" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Item 3 -->
  <text x="58" y="244" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="13">💻</text>
  <text x="80" y="244" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="13">Notebook HP Pavilion 14</text>
  <text x="420" y="244" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="11">SKU-0063</text>
  <line x1="50" y1="256" x2="506" y2="256" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Item 4 -->
  <text x="58" y="280" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="13">🖥️</text>
  <text x="80" y="280" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="13">Notebook Stand / Suporte</text>
  <text x="420" y="280" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="11">SKU-0077</text>
  <line x1="50" y1="292" x2="506" y2="292" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Footer -->
  <text x="50" y="312" fill="#555" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-style="italic">4 resultados para "notebook" · p-filter-keys: ['descricao', 'codigo']</text>

  <!-- Right: input-type example -->
  <rect x="548" y="140" width="220" height="130" rx="6" fill="#1e1e2a" stroke="#353555" stroke-width="1"/>
  <text x="558" y="160" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="10">p-search-type="input"</text>
  <text x="558" y="176" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="10">busca a cada keystroke</text>
  <rect x="558" y="184" width="200" height="28" rx="14" fill="#1e1e1e" stroke="#353535" stroke-width="1"/>
  <text x="574" y="202" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="13">🔍</text>
  <text x="592" y="202" fill="#555" font-family="Segoe UI,Arial,sans-serif" font-size="12">Buscar em tempo real</text>
  <text x="558" y="232" fill="#5b9bd5" font-family="Segoe UI,Arial,sans-serif" font-size="10" font-style="italic">(p-change-model) emitido</text>
  <text x="558" y="246" fill="#5b9bd5" font-family="Segoe UI,Arial,sans-serif" font-size="10" font-style="italic">a cada digitação</text>
</svg>
