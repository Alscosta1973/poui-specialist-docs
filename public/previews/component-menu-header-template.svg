<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <rect width="800" height="480" fill="#1a1a1a"/>
  <rect width="800" height="52" fill="#2c6fad"/>
  <text x="20" y="33" fill="white" font-family="Segoe UI,Arial,sans-serif" font-size="16" font-weight="600">[p-menu-header-template] — cabeçalho customizado do po-menu</text>
  <rect x="0" y="52" width="800" height="428" fill="#1e1e1e"/>

  <!-- Left: side-by-side menu comparison -->

  <!-- Menu SEM template -->
  <rect x="16" y="70" width="180" height="380" rx="6" fill="#242424" stroke="#353535" stroke-width="1"/>
  <rect x="16" y="70" width="180" height="36" rx="6" fill="#2a2a2a"/>
  <rect x="16" y="94" width="180" height="12" fill="#2a2a2a"/>
  <text x="106" y="93" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Sem template</text>

  <!-- Default logo area (plain) -->
  <rect x="36" y="116" width="140" height="32" rx="4" fill="#1e1e1e"/>
  <text x="106" y="136" fill="#555" font-family="Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">Logo padrão</text>

  <!-- Menu items default -->
  <rect x="36" y="158" width="140" height="28" rx="3" fill="#2c6fad" opacity="0.15"/>
  <text x="24" y="177" fill="#5b9bd5" font-family="Segoe UI,Arial,sans-serif" font-size="10">⌂</text>
  <text x="40" y="177" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="11">Home</text>
  <text x="24" y="203" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="10">$</text>
  <text x="40" y="203" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="11">Financeiro</text>
  <text x="24" y="229" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="10">☰</text>
  <text x="40" y="229" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="11">Pedidos</text>
  <text x="24" y="255" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="10">⚙</text>
  <text x="40" y="255" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="11">Configurações</text>

  <!-- Menu COM template -->
  <rect x="216" y="70" width="220" height="380" rx="6" fill="#242424" stroke="#2c6fad" stroke-width="1.5"/>
  <rect x="216" y="70" width="220" height="36" rx="6" fill="#2a2a2a"/>
  <rect x="216" y="94" width="220" height="12" fill="#2a2a2a"/>
  <text x="326" y="93" fill="#5b9bd5" font-family="Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Com [p-menu-header-template]</text>

  <!-- Custom header area -->
  <rect x="230" y="110" width="192" height="90" rx="4" fill="#1e1e2a" stroke="#2c6fad" stroke-width="0.5"/>
  <!-- Avatar circle -->
  <circle cx="260" cy="140" r="22" fill="#2c6fad" opacity="0.3" stroke="#2c6fad" stroke-width="1.5"/>
  <text x="260" y="146" fill="#5b9bd5" font-family="Segoe UI,Arial,sans-serif" font-size="18" text-anchor="middle">AC</text>
  <!-- User info -->
  <text x="292" y="130" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="600">Andre Costa</text>
  <text x="292" y="146" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="10">andre@empresa.com</text>
  <!-- Role badge -->
  <rect x="292" y="152" width="56" height="16" rx="8" fill="#2c6fad" opacity="0.3"/>
  <text x="320" y="163" fill="#5b9bd5" font-family="Segoe UI,Arial,sans-serif" font-size="9" text-anchor="middle">Administrador</text>
  <!-- Divider -->
  <line x1="230" y1="200" x2="422" y2="200" stroke="#353535" stroke-width="1"/>

  <!-- Menu items with template -->
  <rect x="230" y="210" width="192" height="28" rx="3" fill="#2c6fad" opacity="0.15"/>
  <text x="222" y="229" fill="#5b9bd5" font-family="Segoe UI,Arial,sans-serif" font-size="10">⌂</text>
  <text x="238" y="229" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="11">Home</text>
  <text x="222" y="255" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="10">$</text>
  <text x="238" y="255" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="11">Financeiro</text>
  <text x="222" y="281" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="10">☰</text>
  <text x="238" y="281" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="11">Pedidos</text>
  <text x="222" y="307" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="10">⚙</text>
  <text x="238" y="307" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="11">Configurações</text>

  <!-- Arrow between -->
  <text x="204" y="160" fill="#2c6fad" font-family="Segoe UI,Arial,sans-serif" font-size="18">→</text>

  <!-- Code example on right -->
  <rect x="460" y="70" width="322" height="380" rx="6" fill="#1e1e2a" stroke="#353535" stroke-width="1"/>
  <text x="476" y="96" fill="#888" font-family="monospace,Consolas" font-size="10">// template.html</text>
  <text x="476" y="114" fill="#5b9bd5" font-family="monospace,Consolas" font-size="10">&lt;po-menu [p-menus]="menuItems"&gt;</text>
  <text x="476" y="130" fill="#aaa" font-family="monospace,Consolas" font-size="10">  &lt;ng-template p-menu-header-template&gt;</text>
  <text x="476" y="146" fill="#aaa" font-family="monospace,Consolas" font-size="10">    &lt;div class="po-pa-md"&gt;</text>
  <text x="476" y="162" fill="#aaa" font-family="monospace,Consolas" font-size="10">      &lt;po-avatar</text>
  <text x="476" y="178" fill="#aaa" font-family="monospace,Consolas" font-size="10">        [p-src]="user().foto"</text>
  <text x="476" y="194" fill="#aaa" font-family="monospace,Consolas" font-size="10">        p-size="sm"&gt;</text>
  <text x="476" y="210" fill="#aaa" font-family="monospace,Consolas" font-size="10">      &lt;/po-avatar&gt;</text>
  <text x="476" y="226" fill="#aaa" font-family="monospace,Consolas" font-size="10">      &lt;strong&gt;\{\{ user().nome \}\}&lt;/strong&gt;</text>
  <text x="476" y="242" fill="#aaa" font-family="monospace,Consolas" font-size="10">      &lt;small&gt;\{\{ user().email \}\}&lt;/small&gt;</text>
  <text x="476" y="258" fill="#aaa" font-family="monospace,Consolas" font-size="10">      &lt;po-tag [p-value]="user().perfil"&gt;</text>
  <text x="476" y="274" fill="#aaa" font-family="monospace,Consolas" font-size="10">      &lt;/po-tag&gt;</text>
  <text x="476" y="290" fill="#aaa" font-family="monospace,Consolas" font-size="10">    &lt;/div&gt;</text>
  <text x="476" y="306" fill="#aaa" font-family="monospace,Consolas" font-size="10">  &lt;/ng-template&gt;</text>
  <text x="476" y="322" fill="#5b9bd5" font-family="monospace,Consolas" font-size="10">&lt;/po-menu&gt;</text>
  <line x1="476" y1="338" x2="766" y2="338" stroke="#353535" stroke-width="0.5"/>
  <text x="476" y="356" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="10">Sem context variable — o template acessa</text>
  <text x="476" y="370" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="10">diretamente o escopo do componente pai.</text>
  <text x="476" y="390" fill="#5b9bd5" font-family="Segoe UI,Arial,sans-serif" font-size="10" font-style="italic">Ideal para: user card, logo dinâmico, seletor de empresa</text>
</svg>
