<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <!-- Background page -->
  <rect width="800" height="480" fill="#1a1a1a"/>

  <!-- Toolbar -->
  <rect width="800" height="52" fill="#2c6fad"/>
  <text x="20" y="33" fill="white" font-family="Segoe UI,Arial,sans-serif" font-size="16" font-weight="600">Pedidos de Compra</text>

  <!-- Page body -->
  <rect x="0" y="52" width="800" height="428" fill="#1e1e1e"/>

  <!-- Page title -->
  <text x="20" y="84" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="16" font-weight="600">Pedidos de Compra</text>

  <!-- Table header (left/main area) -->
  <rect x="16" y="98" width="432" height="34" rx="3" fill="#252525"/>
  <text x="30"  y="120" fill="#aaa" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="600">Número</text>
  <text x="120" y="120" fill="#aaa" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="600">Fornecedor</text>
  <text x="300" y="120" fill="#aaa" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="600">Valor</text>
  <text x="390" y="120" fill="#aaa" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="600">Status</text>

  <!-- Row 1 — active/selected -->
  <rect x="16" y="132" width="432" height="36" fill="#1a2a3a"/>
  <text x="30"  y="155" fill="#5b9bd5" font-family="Segoe UI,Arial,sans-serif" font-size="13">PC000001</text>
  <text x="120" y="155" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13">Acme Corp</text>
  <text x="300" y="155" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13">R$ 12.500,00</text>

  <!-- Row 2 -->
  <rect x="16" y="168" width="432" height="36" fill="#222"/>
  <text x="30"  y="191" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13" opacity="0.5">PC000002</text>
  <text x="120" y="191" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13" opacity="0.5">Beta Ltda</text>
  <text x="300" y="191" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13" opacity="0.5">R$ 7.800,00</text>

  <!-- Row 3 -->
  <rect x="16" y="204" width="432" height="36" fill="#1e1e1e"/>
  <text x="30"  y="227" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13" opacity="0.5">PC000003</text>
  <text x="120" y="227" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13" opacity="0.5">Gama ME</text>
  <text x="300" y="227" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="13" opacity="0.5">R$ 3.200,00</text>

  <!-- Slide panel (right) — blue left border indicates it slides from the right -->
  <rect x="462" y="52" width="338" height="428" fill="#242424" stroke="#353535" stroke-width="1"/>
  <rect x="462" y="52" width="3"   height="428" fill="#2c6fad"/>

  <!-- Panel header -->
  <rect x="462" y="52" width="338" height="52" fill="#2a2a2a"/>
  <text x="480" y="82" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="15" font-weight="600">Detalhes do Pedido</text>
  <text x="783" y="82" fill="#888"   font-family="Segoe UI,Arial,sans-serif" font-size="18" text-anchor="middle">✕</text>
  <line x1="462" y1="104" x2="800" y2="104" stroke="#353535" stroke-width="1"/>

  <!-- Info row 1 -->
  <text x="480" y="128" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="11">Número</text>
  <text x="480" y="146" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="14">PC000001</text>
  <text x="630" y="128" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="11">Data de Emissão</text>
  <text x="630" y="146" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="14">14/06/2026</text>
  <line x1="462" y1="160" x2="800" y2="160" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Info row 2 -->
  <text x="480" y="182" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="11">Fornecedor</text>
  <text x="480" y="200" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="14">Acme Corp</text>
  <text x="630" y="182" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="11">CNPJ</text>
  <text x="630" y="200" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="14">00.000.000/0001-00</text>
  <line x1="462" y1="214" x2="800" y2="214" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Valor destaque -->
  <text x="480" y="238" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="11">Valor Total</text>
  <text x="480" y="260" fill="#4caf50" font-family="Segoe UI,Arial,sans-serif" font-size="20" font-weight="600">R$ 12.500,00</text>

  <!-- Status tag -->
  <text x="480" y="290" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="11">Status</text>
  <rect x="480" y="298" width="74" height="22" rx="11" fill="#1a3a1a"/>
  <text x="517" y="313" fill="#4caf50" font-family="Segoe UI,Arial,sans-serif" font-size="12" text-anchor="middle">Aprovado</text>
  <line x1="462" y1="334" x2="800" y2="334" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Mini table (itens) -->
  <text x="480" y="356" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="11">Itens do Pedido</text>
  <rect x="480" y="364" width="300" height="24" rx="3" fill="#252525"/>
  <text x="490" y="380" fill="#aaa" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="600">Produto</text>
  <text x="680" y="380" fill="#aaa" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="600">Qtd</text>
  <rect x="480" y="388" width="300" height="24" fill="#1e1e1e"/>
  <text x="490" y="404" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="12">Produto ABC — Ref. 001</text>
  <text x="680" y="404" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="12">10</text>

  <!-- Footer -->
  <line x1="462" y1="424" x2="800" y2="424" stroke="#353535" stroke-width="1"/>
  <rect x="564" y="432" width="80" height="30" rx="4" fill="transparent" stroke="#353535" stroke-width="1"/>
  <text x="604" y="452" fill="#aaa"   font-family="Segoe UI,Arial,sans-serif" font-size="13" text-anchor="middle">Fechar</text>
  <rect x="656" y="432" width="80" height="30" rx="4" fill="#2c6fad"/>
  <text x="696" y="452" fill="white" font-family="Segoe UI,Arial,sans-serif" font-size="13" text-anchor="middle">Editar</text>
</svg>
