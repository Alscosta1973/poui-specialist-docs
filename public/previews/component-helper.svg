<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <rect width="800" height="480" fill="#1a1a1a"/>
  <!-- Toolbar -->
  <rect width="800" height="52" fill="#2c6fad"/>
  <text x="20" y="33" fill="white" font-family="Segoe UI,Arial,sans-serif" font-size="16" font-weight="600">Cadastro de Produto</text>
  <!-- Body -->
  <rect x="0" y="52" width="800" height="428" fill="#1e1e1e"/>

  <!-- Form card -->
  <rect x="16" y="70" width="768" height="380" rx="6" fill="#242424" stroke="#353535" stroke-width="1"/>

  <!-- Row 1: field with po-helper -->
  <!-- Label + helper icon -->
  <text x="36" y="102" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="11">Código EAN</text>
  <!-- Helper icon circle -->
  <circle cx="124" cy="98" r="8" fill="transparent" stroke="#2c6fad" stroke-width="1.5"/>
  <text x="124" y="102" fill="#5b9bd5" font-family="Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle" font-weight="700">?</text>

  <rect x="36" y="108" width="240" height="30" rx="4" fill="#1e1e1e" stroke="#353535" stroke-width="1"/>
  <text x="50" y="127" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="12">7891234567890</text>

  <!-- Help popup (open) for EAN -->
  <rect x="134" y="80" width="260" height="68" rx="6" fill="#1e2a3a" stroke="#2c6fad" stroke-width="1"/>
  <!-- Pointer triangle -->
  <polygon points="126,108 134,98 134,118" fill="#1e2a3a" stroke="#2c6fad" stroke-width="1"/>
  <rect x="134" y="80" width="260" height="1" rx="1" fill="#1e2a3a"/>
  <text x="144" y="97" fill="#5b9bd5" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="600">Código EAN</text>
  <text x="144" y="113" fill="#aaa" font-family="Segoe UI,Arial,sans-serif" font-size="10">13 dígitos impressos no código de barras</text>
  <text x="144" y="127" fill="#aaa" font-family="Segoe UI,Arial,sans-serif" font-size="10">do produto. Obrigatório para itens físicos.</text>

  <!-- Row 2 -->
  <text x="36" y="162" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="11">Descrição</text>
  <rect x="36" y="168" width="500" height="30" rx="4" fill="#1e1e1e" stroke="#353535" stroke-width="1"/>
  <text x="50" y="187" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="12">Notebook Dell Inspiron 15 i7 16GB</text>

  <!-- Row 3: NCM with helper -->
  <text x="36" y="222" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="11">NCM</text>
  <circle cx="70" cy="218" r="8" fill="transparent" stroke="#2c6fad" stroke-width="1.5"/>
  <text x="70" y="222" fill="#5b9bd5" font-family="Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle" font-weight="700">?</text>
  <rect x="36" y="228" width="160" height="30" rx="4" fill="#1e1e1e" stroke="#353535" stroke-width="1"/>
  <text x="50" y="247" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="12">8471.30.12</text>

  <!-- p-help inline example -->
  <text x="300" y="222" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="11">Unidade</text>
  <rect x="300" y="228" width="140" height="30" rx="4" fill="#1e1e1e" stroke="#353535" stroke-width="1"/>
  <text x="314" y="247" fill="#e0e0e0" font-family="Segoe UI,Arial,sans-serif" font-size="12">UN</text>
  <text x="300" y="265" fill="#555" font-family="Segoe UI,Arial,sans-serif" font-size="10" font-style="italic">p-help="UN = Unidade, CX = Caixa, KG = Kilograma"</text>

  <!-- Divider -->
  <line x1="36" y1="288" x2="764" y2="288" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Code hint -->
  <rect x="36" y="300" width="720" height="66" rx="4" fill="#1e1e2a" stroke="#353555" stroke-width="1"/>
  <text x="50" y="320" fill="#888" font-family="monospace,Consolas" font-size="11">&lt;po-input p-label="Código EAN" formControlName="ean"&gt;&lt;/po-input&gt;</text>
  <text x="50" y="337" fill="#888" font-family="monospace,Consolas" font-size="11">&lt;po-helper p-literal="13 dígitos impressos no código de barras."&gt;&lt;/po-helper&gt;</text>
  <text x="50" y="354" fill="#555" font-family="monospace,Consolas" font-size="10">ou: &lt;po-input p-help="Texto de ajuda inline abaixo do campo"&gt;&lt;/po-input&gt;</text>
</svg>
